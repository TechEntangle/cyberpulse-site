name: Generate CyberPulse Daily Briefing

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Edition date in YYYY-MM-DD format'
        required: true
      dry_run:
        description: 'Run validation/build without git push or email send'
        required: false
        default: 'false'
      send_newsletter:
        description: 'Send newsletter after publish'
        required: false
        default: 'true'
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

concurrency:
  group: cyberpulse-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-publish-email:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DATE_INPUT: ${{ github.event.inputs.date }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      SEND_NEWSLETTER: ${{ github.event.inputs.send_newsletter || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install -g wrangler@latest

      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Resolve date
        id: date
        run: |
          if [ -n "${DATE_INPUT}" ]; then
            DATE="${DATE_INPUT}"
          else
            DATE=$(date -u +%F)
          fi
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest in cloud
        run: node scripts/cloud-generate-manifest.mjs "${{ steps.date.outputs.date }}"

      - name: Check topic diversity against last three manifests
        run: node scripts/check-topic-diversity.mjs "${{ steps.date.outputs.date }}"

      - name: Validate manifest is final
        run: |
          if [ ! -f "content/${{ steps.date.outputs.date }}.json" ]; then
            echo "Missing manifest for ${{ steps.date.outputs.date }}."
            echo "Cloud generation did not produce a manifest."
            exit 1
          fi
          if grep -q 'Draft manifest generated automatically' "content/${{ steps.date.outputs.date }}.json"; then
            echo "Manifest for ${{ steps.date.outputs.date }} is still a draft scaffold."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish manifest edition
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            node --input-type=module -e "import('./functions/generate-edition.js').then(async m => { const manifest = JSON.parse(require('fs').readFileSync('./content/${{ steps.date.outputs.date }}.json', 'utf8')); const result = await import('./lib/publish.js').then(p => p.publishToRepo(manifest, { dryRun: true })); console.log(JSON.stringify(result, null, 2)); })"
          else
            node --input-type=module -e "import('./lib/publish.js').then(async p => { const fs = await import('fs'); const manifest = JSON.parse(fs.readFileSync('./content/${{ steps.date.outputs.date }}.json', 'utf8')); const result = await p.publishToRepo(manifest); console.log(JSON.stringify(result, null, 2)); })"
          fi

      - name: Send newsletter
        if: ${{ env.SEND_NEWSLETTER == 'true' }}
        run: |
          TITLE=$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.title)")
          DESC=$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.ogDescription)")
          EDITION=$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.edition)")
          if [ "${DRY_RUN}" = "true" ]; then
            node email/send.js --date "${{ steps.date.outputs.date }}" --title "$TITLE" --desc "$DESC" --edition "$EDITION" --dry-run
          else
            node email/send.js --date "${{ steps.date.outputs.date }}" --title "$TITLE" --desc "$DESC" --edition "$EDITION"
          fi
