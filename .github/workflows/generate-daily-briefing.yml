name: Generate CyberPulse Daily Briefing

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Edition date in YYYY-MM-DD format'
        required: true
      dry_run:
        description: 'Run validation/build without git push or email send'
        required: false
        default: 'false'
      send_newsletter:
        description: 'Send newsletter after publish'
        required: false
        default: 'true'
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:
  generate-publish-email:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DATE_INPUT: ${{ github.event.inputs.date }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      SEND_NEWSLETTER: ${{ github.event.inputs.send_newsletter || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g wrangler@latest

      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Resolve date
        id: date
        run: |
          if [ -n "${DATE_INPUT}" ]; then
            DATE="${DATE_INPUT}"
          else
            DATE=$(date -u +%F)
          fi
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Ensure manifest exists
        run: |
          if [ ! -f "content/${{ steps.date.outputs.date }}.json" ]; then
            echo "Missing manifest for ${{ steps.date.outputs.date }}."
            echo "Automatic editorial generation is not wired in this workflow yet, so create the manifest first."
            exit 1
          fi
          if grep -q 'Draft manifest generated automatically' "content/${{ steps.date.outputs.date }}.json"; then
            echo "Manifest for ${{ steps.date.outputs.date }} is still a draft scaffold. Daily generation is not fully automated yet."
            echo "Please replace the scaffold with final editorial content before publish."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish manifest edition
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            node scripts/generate-og.js "${{ steps.date.outputs.date }}" "$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.title)")" "$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.ogDescription)")"
            node scripts/build-from-content.js "${{ steps.date.outputs.date }}"
            node scripts/render-site-from-content.js
            node scripts/validate-publish.js "${{ steps.date.outputs.date }}"
          else
            node scripts/publish-manifest.js "${{ steps.date.outputs.date }}"
          fi

      - name: Send newsletter
        if: ${{ env.SEND_NEWSLETTER == 'true' }}
        run: |
          TITLE=$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.title)")
          DESC=$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.ogDescription)")
          EDITION=$(node -e "const e=require('./content/${{ steps.date.outputs.date }}.json'); console.log(e.edition)")
          if [ "${DRY_RUN}" = "true" ]; then
            node email/send.js --date "${{ steps.date.outputs.date }}" --title "$TITLE" --desc "$DESC" --edition "$EDITION" --dry-run
          else
            node email/send.js --date "${{ steps.date.outputs.date }}" --title "$TITLE" --desc "$DESC" --edition "$EDITION"
          fi
