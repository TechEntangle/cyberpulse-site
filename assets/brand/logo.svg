<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#0A0C12"/>
  <rect x="32" y="32" width="448" height="448" rx="108" fill="url(#bg)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!--
    CP monogram: C (gold arc) shares vertical edge with P (cream stem+bowl).
    Clean geometric shapes, no strokes — all fills for crisp rendering.
  -->
  <!-- C: open arc, 40px stroke equivalent as filled shape -->
  <path d="M236 152C174.1 152 124 202.1 124 264C124 325.9 174.1 376 236 376H260V336H236C196.2 336 164 303.8 164 264C164 224.2 196.2 192 236 192H260V152H236Z" fill="#F0B44A"/>
  <!-- P: vertical stem -->
  <rect x="276" y="152" width="40" height="224" rx="20" fill="#F5EFE6"/>
  <!-- P: bowl (half-circle bulge) -->
  <path d="M296 152H330C366.5 152 396 181.5 396 218C396 254.5 366.5 284 330 284H296V244H330C344.4 244 356 232.4 356 218C356 203.6 344.4 192 330 192H296V152Z" fill="#F5EFE6"/>
  <!-- Signal dot -->
  <circle cx="348" cy="344" r="18" fill="#F0B44A" opacity="0.55"/>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="440" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#131720"/>
      <stop offset="1" stop-color="#0A0C12"/>
    </linearGradient>
  </defs>
</svg>
