<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribe | CyberPulse</title>
  <link rel="icon" type="image/png" href="/assets/brand/logo-square.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06070a; --bg-soft: #0b0d12; --text: #f6f1e8; --text-secondary: #d4cdc2;
      --muted: #9e9689; --gold: #f0b44a; --gold-dim: rgba(240,180,74,0.15);
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
      --surface: rgba(255,255,255,0.04); --radius-md: 20px; --radius-sm: 14px;
    }
    * { box-sizing: border-box; margin: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a1d28 0%, #0b0d12 40%, #06070a 100%);
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 32px 16px;
    }
    .card {
      max-width: 480px; width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 40px 36px; text-align: center;
    }
    .brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 28px; }
    .brand img { width: 36px; height: 36px; border-radius: 8px; }
    .brand-name { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.65; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    input[type="email"] {
      width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-soft); color: var(--text);
      font-size: 15px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus { border-color: var(--gold); }
    input[type="email"]::placeholder { color: var(--muted); }
    .btn {
      display: inline-block; padding: 12px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 700; cursor: pointer; border: none;
      font-family: inherit; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-unsub {
      background: var(--surface); color: var(--text); border: 1px solid var(--border-strong);
    }
    .btn-unsub:hover { border-color: var(--gold); }
    .btn-resub {
      background: var(--gold); color: #15120c;
      box-shadow: 0 4px 16px rgba(240,180,74,0.25);
    }
    .btn-resub:hover { box-shadow: 0 8px 28px rgba(240,180,74,0.35); }
    .status { margin-top: 20px; padding: 14px; border-radius: var(--radius-sm); font-size: 14px; display: none; }
    .status.success { display: block; background: rgba(240,180,74,0.1); color: var(--gold); border: 1px solid rgba(240,180,74,0.2); }
    .status.error { display: block; background: rgba(255,100,100,0.1); color: #ff9f8c; border: 1px solid rgba(255,100,100,0.2); }
    .back { display: inline-block; margin-top: 20px; color: var(--gold); font-size: 13px; font-weight: 600; text-decoration: none; }
    .back:hover { opacity: 0.8; }
    .mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/assets/brand/logo-square.png" alt="CyberPulse" />
      <span class="brand-name">CyberPulse</span>
    </div>
    <div class="mono">Email preferences</div>
    <h1>Manage subscription</h1>
    <p>Enter your email below to unsubscribe from CyberPulse briefings, or resubscribe if you've changed your mind.</p>
    <div class="form-group">
      <input type="email" id="email" placeholder="you@example.com" required />
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="btn btn-unsub" id="unsubBtn" type="button">Unsubscribe</button>
      <button class="btn btn-resub" id="resubBtn" type="button">Resubscribe</button>
    </div>
    <div class="status" id="status"></div>
    <a class="back" href="/">&larr; Back to CyberPulse</a>
  </div>
  <script>
    // Static site: this page works as a self-service form.
    // For full automation, connect these buttons to the subscriber API.
    // Currently shows a confirmation message directing users to email for manual processing.
    const statusEl = document.getElementById('status');
    const emailEl = document.getElementById('email');

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    document.getElementById('unsubBtn').addEventListener('click', () => {
      const email = emailEl.value.trim();
      if (!email) return showStatus('Please enter your email address.', 'error');
      showStatus(
        'Your unsubscribe request has been noted. Please email cyberpulse@tusharvartak.com to confirm removal. We process requests within 24 hours.',
        'success'
      );
    });

    document.getElementById('resubBtn').addEventListener('click', () => {
      const email = emailEl.value.trim();
      if (!email) return showStatus('Please enter your email address.', 'error');
      showStatus(
        'To resubscribe, please email cyberpulse@tusharvartak.com or use the subscribe form on the homepage.',
        'success'
      );
    });
  </script>
</body>
</html>
