<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberPulse Archive | All Editions</title>
  <meta name="description" content="Browse all CyberPulse executive cyber intelligence briefings." />
  <link rel="canonical" href="https://tusharvartak.com/archive/" />
  <meta property="og:title" content="CyberPulse Archive" />
  <meta property="og:description" content="Browse all CyberPulse executive cyber intelligence briefings." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tusharvartak.com/archive/" />
  <meta property="og:site_name" content="CyberPulse" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="CyberPulse Archive" />
  <meta name="twitter:description" content="Browse all CyberPulse executive cyber intelligence briefings." />
  <link rel="alternate" type="application/rss+xml" title="CyberPulse RSS Feed" href="/feed.xml" />
  <style>
    :root { --bg:#07080b; --text:#f5efe6; --muted:#b9b0a4; --gold:#f0b44a; --border:rgba(255,255,255,0.1); --panel:rgba(255,255,255,0.04); }
    body.theme-light { --bg:#f7f2e8; --text:#171512; --muted:#6f675d; --gold:#b87b18; --border:rgba(23,21,18,0.1); --panel:rgba(255,255,255,0.92); }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, system-ui, sans-serif; background: radial-gradient(circle at top, #171b24 0%, #0b0d12 40%, #06070a 100%); color:var(--text); transition: background 0.25s ease, color 0.25s ease; }
    body.theme-light { background: linear-gradient(180deg, #fffdf8 0%, #f7f2e8 100%); }
    .wrap { width:min(1000px, calc(100% - 32px)); margin:0 auto; padding:42px 0 80px; }
    a { color:inherit; text-decoration:none; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:28px; }
    .brand { display:inline-flex; gap:12px; align-items:center; text-decoration:none; font-weight:800; letter-spacing:-0.03em; }
    .brand-mark { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:linear-gradient(135deg, var(--gold), #ff7c6b); color:#15120c; font-weight:900; }
    .brand-sub { color:var(--muted); font-size:13px; font-weight:600; }
    .nav-actions { display:flex; gap:10px; align-items:center; }
    .nav-links { display:flex; gap:18px; align-items:center; font-size:14px; font-weight:600; }
    .nav-links a { text-decoration:none; color:var(--muted); transition:color 0.2s; }
    .nav-links a:hover { color:var(--text); }
    .nav-links .rss-link { color:var(--gold); }
    .theme-toggle { display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-weight:700; font-size:13px; cursor:pointer; }
    h1 { font-size: clamp(42px, 7vw, 78px); line-height:0.95; letter-spacing:-0.05em; margin:18px 0 24px; }
    .item { background:var(--panel); border:1px solid var(--border); border-radius:22px; padding:22px; margin-bottom:16px; display:flex; justify-content:space-between; gap:16px; align-items:center; transition: border-color 0.2s ease; }
    .item:hover { border-color: rgba(240,180,74,0.35); }
    .date { color:var(--gold); text-transform:uppercase; letter-spacing:0.12em; font-size:12px; font-weight:800; margin-bottom:8px; }
    .title { font-size:24px; margin-bottom:8px; }
    .desc { color:var(--muted); line-height:1.6; }
    .arrow { min-width:44px; height:44px; border-radius:999px; display:grid; place-items:center; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); font-size:22px; }
    footer { padding:20px 0 0; color:var(--muted); font-size:14px; border-top:1px solid var(--border); margin-top:28px; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    footer a { color:var(--gold); text-decoration:none; }
    footer a:hover { text-decoration:underline; }
    @media (max-width: 760px) { .item { flex-direction:column; align-items:flex-start; } .nav-links { gap:12px; font-size:13px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="topbar" role="navigation" aria-label="Main navigation">
      <a class="brand" href="/">
        <span class="brand-mark">CP</span>
        <span>
          <div>CyberPulse</div>
          <div class="brand-sub">Executive cyber intelligence</div>
        </span>
      </a>
      <div class="nav-actions">
        <div class="nav-links">
          <a href="/about/">About</a>
          <a class="rss-link" href="/feed.xml" title="RSS Feed">RSS</a>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">Light</button>
      </div>
    </nav>
    <h1>Archive</h1>
    <a class="item" href="/posts/2026-04-18.html">
      <div>
        <div class="date">April 18, 2026</div>
        <div class="title">The Executive Is the New Perimeter</div>
        <div class="desc">A board-level analysis of SharePoint exploitation, executive-targeted social engineering, and AI-driven attack acceleration.</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <footer>
      <span>CyberPulse by Tushar Vartak</span>
      <span><a href="/feed.xml">RSS</a> · <a href="/">Home</a> · <a href="/about/">About</a></span>
    </footer>
  </div>
  <script>
    const storedTheme = localStorage.getItem('cyberpulse-theme');
    if (storedTheme === 'light') document.body.classList.add('theme-light');
    const btn = document.getElementById('themeToggle');
    const syncThemeLabel = () => {
      const isLight = document.body.classList.contains('theme-light');
      btn.textContent = isLight ? 'Dark' : 'Light';
    };
    syncThemeLabel();
    btn.addEventListener('click', () => {
      document.body.classList.toggle('theme-light');
      localStorage.setItem('cyberpulse-theme', document.body.classList.contains('theme-light') ? 'light' : 'dark');
      syncThemeLabel();
    });
  </script>
</body>
</html>
